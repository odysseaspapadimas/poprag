# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "PopRAG dashboard"

[setup]
script = """
set -euo pipefail

cd "$CODEX_WORKTREE_PATH"

if [ -f "$CODEX_SOURCE_TREE_PATH/.env" ]; then
  cp "$CODEX_SOURCE_TREE_PATH/.env" "$CODEX_WORKTREE_PATH/.env"
  chmod 600 "$CODEX_WORKTREE_PATH/.env" 2>/dev/null || true
else
  echo "No .env found at $CODEX_SOURCE_TREE_PATH/.env; skipping copy."
fi

if [ -f pnpm-lock.yaml ]; then
  if command -v pnpm >/dev/null 2>&1; then
    pnpm install --frozen-lockfile
  elif command -v corepack >/dev/null 2>&1; then
    corepack pnpm install --frozen-lockfile
  elif command -v npx >/dev/null 2>&1; then
    npx --yes pnpm@latest install --frozen-lockfile
  elif [ -x /opt/homebrew/bin/npx ]; then
    /opt/homebrew/bin/npx --yes pnpm@latest install --frozen-lockfile
  else
    echo "pnpm-lock.yaml found, but pnpm/corepack/npx is unavailable." >&2
    exit 1
  fi
elif [ -f package-lock.json ]; then
  npm ci
else
  npm install
fi
"""
